services:
  rvc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rvc
    # Bind Gradio to 0.0.0.0 *inside the container* so the published port is
    # reachable from the host. The app still defaults to 127.0.0.1 elsewhere.
    environment:
      - SERVER_NAME=0.0.0.0
    volumes:
      - ./weights:/app/assets/weights
      - ./opt:/app/opt
      # - ./dataset:/app/dataset # you can use this folder in order to provide your dataset for model training
    ports:
      - 7865:7865
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]